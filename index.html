<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Upload PWA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'ui-sans-serif', 'sans-serif']
          }
        }
      }
    };
  </script>
  <link rel="manifest" href="manifest.json">
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-100 to-rose-100 px-3 py-6 font-display text-slate-900 sm:px-6 sm:py-10 lg:flex lg:items-center lg:justify-center lg:p-10">
  <div class="mx-auto w-full max-w-sm rounded-3xl border border-white/70 bg-white/80 p-4 shadow-[0_20px_80px_-30px_rgba(15,23,42,0.45)] backdrop-blur-sm sm:max-w-2xl sm:p-6 lg:max-w-3xl lg:p-8">
    <div>
      <h1 class="text-balance text-xl font-bold tracking-tight sm:text-2xl lg:text-3xl">Husk!</h1>

      <div class="relative mt-4 overflow-hidden rounded-2xl border border-slate-200 bg-slate-50 sm:mt-6">
        <img id="display-image-bg" src="placeholder.png" alt="" aria-hidden="true" class="pointer-events-none absolute inset-0 h-full w-full scale-110 object-cover blur-2xl opacity-80">
        <div aria-hidden="true" class="pointer-events-none absolute inset-0 bg-black/20"></div>
        <img id="display-image" src="placeholder.png" alt="Uploaded Image" tabindex="0" role="button" aria-label="Open full image" class="relative z-10 h-56 w-full cursor-zoom-in object-contain sm:h-72 lg:h-[24rem]">
      </div>

      <div class="mt-4 rounded-2xl border border-slate-200/80 bg-white/80 p-4 sm:mt-6 sm:p-5">
        <div class="flex flex-col gap-3 sm:flex-row">
          <label for="image-input" class="flex-1 cursor-pointer">
            <input
              type="file"
              id="image-input"
              accept="image/*"
              class="sr-only"
            >
            <span class="flex w-full items-center justify-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 focus-within:ring-2 focus-within:ring-orange-400/60">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
              Upload image
            </span>
          </label>

          <label for="camera-input" class="flex-1 cursor-pointer">
            <input
              type="file"
              id="camera-input"
              accept="image/*"
              capture="environment"
              class="sr-only"
            >
            <span class="flex w-full items-center justify-center gap-2 rounded-xl border border-orange-400 bg-orange-500 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-orange-600">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
              Take picture
            </span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div id="image-lightbox" class="fixed inset-0 z-50 hidden bg-black/90 p-3 sm:p-6" aria-hidden="true">
    <button id="lightbox-close" type="button" class="absolute right-3 top-3 rounded-lg border border-white/30 bg-black/40 px-3 py-2 text-sm font-medium text-white hover:bg-black/60 sm:right-6 sm:top-6">Close</button>
    <div class="flex h-full w-full items-center justify-center">
      <img id="lightbox-image" src="placeholder.png" alt="Full image" class="max-h-[100dvh] max-w-[100vw] cursor-zoom-out rounded-lg object-contain shadow-2xl">
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
