<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One shot, please</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'ui-sans-serif', 'sans-serif']
          }
        }
      }
    };
  </script>
  <link rel="manifest" href="manifest.json">
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-100 to-rose-100 px-3 py-6 font-display text-slate-900 sm:px-6 sm:py-10 lg:p-10">
  <div class="mx-auto w-full max-w-sm sm:max-w-5xl lg:max-w-7xl">
    <div class="mb-4 flex items-center justify-between gap-4 sm:mb-6">
      <h1 class="text-xl font-bold tracking-tight sm:text-2xl lg:text-3xl">One shot, please</h1>
      <button id="add-card-btn" type="button" class="flex shrink-0 items-center gap-1.5 rounded-2xl border border-white/70 bg-white/80 px-4 py-2 text-sm font-semibold text-slate-700 shadow-md backdrop-blur-sm transition hover:bg-white/90">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        Add
      </button>
    </div>
    <div id="cards-container" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
    </div>
  </div>

  <div id="image-lightbox" class="fixed inset-0 z-50 hidden bg-black/90 p-3 sm:p-6" aria-hidden="true">
    <button id="lightbox-close" type="button" class="absolute right-3 top-3 rounded-lg border border-white/30 bg-black/40 px-3 py-2 text-sm font-medium text-white hover:bg-black/60 sm:right-6 sm:top-6">Close</button>
    <div class="flex h-full w-full items-center justify-center">
      <img id="lightbox-image" src="res/oneshot.png" alt="Full image" class="max-h-[100dvh] max-w-[100vw] cursor-zoom-out rounded-lg object-contain shadow-2xl">
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
