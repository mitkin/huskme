<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Upload PWA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'ui-sans-serif', 'sans-serif']
          }
        }
      }
    };
  </script>
  <link rel="manifest" href="manifest.json">
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-100 to-rose-100 px-3 py-6 font-display text-slate-900 sm:px-6 sm:py-10 lg:flex lg:items-center lg:justify-center lg:p-10">
  <div class="mx-auto w-full max-w-sm rounded-3xl border border-white/70 bg-white/80 p-4 shadow-[0_20px_80px_-30px_rgba(15,23,42,0.45)] backdrop-blur-sm sm:max-w-2xl sm:p-6 lg:max-w-3xl lg:p-8">
    <div>
      <h1 class="text-balance text-xl font-bold tracking-tight sm:text-2xl lg:text-3xl">Husk!</h1>

      <div class="relative mt-4 overflow-hidden rounded-2xl border border-slate-200 bg-slate-50 sm:mt-6">
        <img id="display-image-bg" src="placeholder.png" alt="" aria-hidden="true" class="pointer-events-none absolute inset-0 h-full w-full scale-110 object-cover blur-2xl opacity-80">
        <div aria-hidden="true" class="pointer-events-none absolute inset-0 bg-black/20"></div>
        <img id="display-image" src="placeholder.png" alt="Uploaded Image" tabindex="0" role="button" aria-label="Open full image" class="relative z-10 h-56 w-full cursor-zoom-in object-contain sm:h-72 lg:h-[24rem]">
      </div>

      <div class="mt-4 rounded-2xl border border-slate-200/80 bg-white/80 p-4 sm:mt-6 sm:p-5">
        <label for="image-input" class="block">
          <span class="mb-2 block text-sm font-medium text-slate-700 sm:text-base">Upload image</span>
          <input
            type="file"
            id="image-input"
            accept="image/*"
            class="block w-full cursor-pointer rounded-xl border border-slate-300 bg-white text-sm text-slate-700 file:mr-3 file:mb-2 file:cursor-pointer file:rounded-lg file:border-0 file:bg-orange-500 file:px-4 file:py-2 file:font-semibold file:text-white file:transition hover:file:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-orange-400/60 sm:file:mb-0"
          >
        </label>
      </div>
    </div>
  </div>

  <div id="image-lightbox" class="fixed inset-0 z-50 hidden bg-black/90 p-3 sm:p-6" aria-hidden="true">
    <button id="lightbox-close" type="button" class="absolute right-3 top-3 rounded-lg border border-white/30 bg-black/40 px-3 py-2 text-sm font-medium text-white hover:bg-black/60 sm:right-6 sm:top-6">Close</button>
    <div class="flex h-full w-full items-center justify-center">
      <img id="lightbox-image" src="placeholder.png" alt="Full image" class="max-h-[100dvh] max-w-[100vw] cursor-zoom-out rounded-lg object-contain shadow-2xl">
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
